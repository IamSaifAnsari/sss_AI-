name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true
      - name: Build frontend
        env:
          VITE_BASE_PATH: /sss_AI-/
          VITE_USE_HASH_ROUTER: 'true'
          VITE_API_BASE_URL: https://neuronstack-backend.onrender.com
        run: npm run build
